<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kuliah - TaskMate</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <h2>📚 TaskMate</h2>

        <div>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <div class="container">

        <!-- FORM TAMBAH JADWAL -->
        <div class="card">

            <h2>Tambah Jadwal Kuliah</h2>

            <div class="form-grid">

                <input
                    type="text"
                    id="courseName"
                    placeholder="Nama Mata Kuliah">

                <select id="courseDay">
                    <option value="Senin">Senin</option>
                    <option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option>
                    <option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option>
                    <option value="Sabtu">Sabtu</option>
                </select>

                <input
                    type="time"
                    id="startTime"
                    placeholder="mulai">                

                <input
                    type="time"
                    id="endTime"
                    placeholder="selesai">

                <input
                    type="text"
                    id="room"
                    placeholder="Ruangan">

                <input
                    type="text"
                    id="lecturer"
                    placeholder="Nama Dosen">

            </div>

            <button
                class="schedule-btn"
                onclick="addSchedule()">
                Tambah Jadwal
            </button>

        </div>

        <!-- JADWAL MINGGUAN -->
        <div class="card schedule-section">

            <h2>📅 Jadwal Minggu Ini</h2>

            <p class="week-subtitle">
                Semua jadwal kuliah dalam satu tampilan mingguan.
            </p>

            <div id="weeklySchedule">

                <!-- Akan diisi otomatis oleh schedule.js -->

            </div>

        </div>

    </div>

    <script src="js/schedule.js"></script>

</body>
</html>
